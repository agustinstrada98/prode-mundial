name: Sync World Cup Results

on:
  # Corre cada hora entre el 11 de junio y el 16 de agosto (horario del torneo)
  schedule:
    - cron: '0 * * * *'
  # También se puede disparar manualmente desde la pestaña Actions en GitHub
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    # Solo corre en el repo principal (no en forks)
    if: github.repository_owner == github.actor || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync
        env:
          FDO_API_KEY: ${{ secrets.FDO_API_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}
        run: node sync.js
