<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#2d333b;
  --border:#30363d;--border2:#3d444d;
  --text:#e6edf3;--text2:#8b949e;--text3:#656d76;
  --accent:#58a6ff;--accent2:#1f6feb;
  --green:#3fb950;--green2:#238636;
  --red:#f85149;--red2:#da3633;
  --yellow:#e3b341;--yellow2:#9e6a03;
  --purple:#bc8cff;--orange:#ffa657;
  --radius:6px;--shadow:0 1px 3px rgba(0,0,0,.4);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}
a{color:var(--accent);text-decoration:none}
input,select{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:6px 10px;font-family:inherit;font-size:14px;outline:none;transition:border .15s}
input:focus,select:focus{border-color:var(--accent)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
button{cursor:pointer;border:none;border-radius:var(--radius);font-family:inherit;font-size:14px;font-weight:500;padding:7px 16px;transition:all .15s}
.btn-primary{background:var(--accent2);color:#fff}
.btn-primary:hover{background:#388bfd}
.btn-green{background:var(--green2);color:#fff}
.btn-green:hover{background:#2ea043}
.btn-red{background:var(--red2);color:#fff}
.btn-red:hover{background:#f85149}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:12px}

/* Layout */
#app-wrap{max-width:1100px;margin:0 auto;padding:0 12px 40px}
.header{padding:16px 0 8px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);margin-bottom:16px}
.header h1{font-size:18px;font-weight:700;flex:1}
.header-user{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:8px}

/* Tabs */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:8px 16px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-weight:500;font-size:13px;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.subtabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.subtab{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:transparent;transition:all .15s}
.subtab:hover{border-color:var(--accent);color:var(--accent)}
.subtab.active{background:var(--accent2);border-color:var(--accent2);color:#fff}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.section-title{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* Flags */
.flag{width:22px;height:16px;object-fit:cover;border-radius:2px;display:inline-block;vertical-align:middle}
.team-cell{display:flex;align-items:center;gap:7px;white-space:nowrap}

/* Match score inputs */
.match-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.match-row:last-child{border-bottom:none}
.match-team{flex:1;display:flex;align-items:center;gap:6px}
.match-team.away{justify-content:flex-end;flex-direction:row-reverse}
.match-team .name{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}
.score-sep{color:var(--text3);font-size:12px;padding:0 2px}
.score-inp{width:44px;text-align:center;padding:5px 4px;font-size:15px;font-weight:600}
.pen-wrap{display:flex;align-items:center;gap:4px;margin-top:4px;font-size:11px;color:var(--text2)}
.pen-inp{width:40px;text-align:center;padding:3px;font-size:13px}
.match-date{font-size:11px;color:var(--text3);white-space:nowrap;min-width:70px;text-align:center}
.result-badge{font-size:12px;font-weight:600;padding:2px 6px;border-radius:4px;margin-left:4px}
.badge-exact{background:rgba(63,185,80,.2);color:var(--green)}
.badge-sign{background:rgba(88,166,255,.15);color:var(--accent)}
.badge-pts{background:var(--bg3);color:var(--text2)}
.real-score{font-size:14px;font-weight:700;color:var(--green);min-width:40px;text-align:center}

/* Tables */
.std-table{width:100%;border-collapse:collapse;font-size:13px}
.std-table th{color:var(--text2);font-weight:500;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);font-size:12px}
.std-table td{padding:6px 8px;border-bottom:1px solid var(--border)}
.std-table tr:last-child td{border-bottom:none}
.std-table .num{text-align:center}
.std-table .pts-col{font-weight:700;color:var(--accent)}
.pos-badge{width:18px;height:18px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-right:4px}
.pos-1{background:rgba(63,185,80,.2);color:var(--green)}
.pos-2{background:rgba(88,166,255,.15);color:var(--accent)}
.pos-3{background:rgba(227,179,65,.15);color:var(--yellow)}
.pos-4{background:var(--bg3);color:var(--text3)}
.qualify-line{border-left:3px solid var(--green)}
.qualify-line3{border-left:3px solid var(--yellow)}

/* Group split view */
.group-split{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.group-split{grid-template-columns:1fr}}
.group-real-label{font-size:11px;color:var(--green);font-weight:600;text-transform:uppercase;margin-bottom:6px}
.group-pred-label{font-size:11px;color:var(--accent);font-weight:600;text-transform:uppercase;margin-bottom:6px}

/* Bonus badge */
.bonus-chip{display:inline-flex;align-items:center;gap:3px;background:rgba(63,185,80,.15);border:1px solid rgba(63,185,80,.3);border-radius:10px;padding:2px 8px;font-size:11px;color:var(--green);font-weight:600}

/* KO Bracket */
.bracket-wrap{overflow-x:auto;padding-bottom:12px}
.bracket{display:flex;gap:0;min-width:900px}
.round-col{flex:1;display:flex;flex-direction:column;padding:0 8px}
.round-label{text-align:center;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:12px}
.ko-slot{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.ko-slot:hover{border-color:var(--border2)}
.ko-team{display:flex;align-items:center;gap:6px;padding:7px 10px;font-size:12px;font-weight:500}
.ko-team:first-child{border-bottom:1px solid var(--border)}
.ko-team .ko-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ko-score-inp{width:32px;text-align:center;padding:2px;font-size:13px;font-weight:700;background:var(--bg3);border:1px solid var(--border);border-radius:3px}
.ko-team.predicted .ko-name{color:var(--accent)}
.ko-team.confirmed .ko-name{color:var(--green)}
.ko-pen-row{padding:4px 10px;background:var(--bg3);font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px}
.ko-pen-inp{width:30px;text-align:center;padding:2px;font-size:12px;background:var(--bg2);border:1px solid var(--border);border-radius:3px;color:var(--text)}
.was-pred{font-size:10px;color:var(--text3);margin-left:4px}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:32px;width:100%;max-width:360px}
.login-box h2{margin-bottom:4px;font-size:18px}
.login-box p{color:var(--text2);font-size:13px;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
.form-group input{width:100%}
.login-err{color:var(--red);font-size:12px;margin-top:8px}

/* Specials */
.specials-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.special-field{display:flex;flex-direction:column;gap:5px}
.special-field label{font-size:12px;color:var(--text2);font-weight:500}
.special-field input,.special-field select{width:100%}
.special-pts{font-size:11px;color:var(--text3)}

/* Ranking */
.rank-table{width:100%;border-collapse:collapse;font-size:13px}
.rank-table th{color:var(--text2);font-size:11px;font-weight:600;padding:6px 8px;text-align:center;border-bottom:2px solid var(--border);text-transform:uppercase;letter-spacing:.05em}
.rank-table td{padding:7px 8px;border-bottom:1px solid var(--border);text-align:center}
.rank-table tr:last-child td{border-bottom:none}
.rank-table .name-col{text-align:left;font-weight:600}
.rank-table .total-col{font-weight:700;color:var(--accent);font-size:15px}
.rank-pos{width:28px;font-weight:700;color:var(--text2)}
.rank-1 .name-col{color:var(--yellow)}
.rank-2 .name-col{color:var(--text2)}
.rank-3 .name-col{color:var(--orange)}

/* Admin */
.admin-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.admin-match-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.admin-match-row:last-child{border-bottom:none}
.admin-team{flex:1;text-align:right}
.admin-team.away{text-align:left}
.admin-inp{width:40px;text-align:center;padding:4px;font-size:14px;font-weight:600}
.admin-save-btn{padding:4px 10px;font-size:12px}
.saved-chip{font-size:11px;color:var(--green);margin-left:6px}
.participant-select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-family:inherit;font-size:13px;width:100%;max-width:300px;margin-bottom:12px}
.pts-breakdown{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.pts-chip{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;text-align:center}
.pts-chip strong{display:block;font-size:16px;color:var(--accent)}

/* Fixture tab */
.fixture-day{margin-bottom:20px}
.fixture-day-header{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:8px}
.fixture-match{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.fixture-match:last-child{border-bottom:none}
.fixture-team{flex:1;display:flex;align-items:center;gap:6px}
.fixture-team.right{justify-content:flex-end;flex-direction:row-reverse}
.fixture-score{font-weight:700;font-size:15px;min-width:50px;text-align:center;color:var(--green)}
.fixture-score.pending{color:var(--text3)}
.fixture-time{font-size:11px;color:var(--text3);min-width:44px;text-align:center}
.fixture-round{font-size:10px;color:var(--text3);background:var(--bg3);border-radius:3px;padding:1px 5px}

/* Utility */

.text-blue{color:var(--accent)}
.text-yellow{color:var(--yellow)}
.text-red{color:var(--red)}
.text-muted{color:var(--text2)}

.fw600{font-weight:600}
.mt8{margin-top:8px}

.flex-center{display:flex;align-items:center}
.gap4{gap:4px}
.gap8{gap:8px}
.flex1{flex:1}
.w100{width:100%}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

function fnv1a(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) { h = Math.imul(h ^ str.charCodeAt(i), 16777619) >>> 0; }
  return h.toString(16).padStart(8,'0');
}
function hashPass(pass, salt) { return fnv1a(salt + pass + salt); }
function genSalt() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

// ==================== STANDINGS ====================
function calcStandings(groupId, results) {
  const teams = GROUPS[groupId].teams;
  const tbl = {};
  teams.forEach(t => { tbl[t] = {team:t,pj:0,g:0,e:0,p:0,gf:0,gc:0,dg:0,pts:0}; });
  GROUPS[groupId].matches.forEach(m => {
    const r = results[m.id];
    if (!r) return;
    const rh = parseInt(r.h), ra = parseInt(r.a);
    if (isNaN(rh) || isNaN(ra) || r.h==='' || r.a==='') return;
    tbl[m.h].pj++; tbl[m.a].pj++;
    tbl[m.h].gf += rh; tbl[m.h].gc += ra; tbl[m.h].dg = tbl[m.h].gf - tbl[m.h].gc;
    tbl[m.a].gf += ra; tbl[m.a].gc += rh; tbl[m.a].dg = tbl[m.a].gf - tbl[m.a].gc;
    if (rh > ra) { tbl[m.h].g++; tbl[m.h].pts+=3; tbl[m.a].p++; }
    else if (ra > rh) { tbl[m.a].g++; tbl[m.a].pts+=3; tbl[m.h].p++; }
    else { tbl[m.h].e++; tbl[m.h].pts++; tbl[m.a].e++; tbl[m.a].pts++; }
  });
  return Object.values(tbl).sort((a,b) => b.pts-a.pts||b.dg-a.dg||b.gf-a.gf||a.team.localeCompare(b.team));
}

function getBestThirds(results) {
  const thirds = [];
  Object.keys(GROUPS).forEach(g => {
    const rows = calcStandings(g, results);
    if (rows.length >= 3) thirds.push({...rows[2], group:g});
  });
  return thirds.sort((a,b) => b.pts-a.pts||b.dg-a.dg||b.gf-a.gf).slice(0,8);
}

function hasGroupData(groupId, results) {
  return GROUPS[groupId].matches.some(m => {
    const r = results[m.id];
    return r && r.h !== undefined && r.h !== '';
  });
}
function resolveSlot(slot, useReal, predGroups) {
  if (!slot) return '?';
  const results = useReal ? S.real.groups : (predGroups || S.myPreds.groups || {});
  if (slot.t === 'grp') {
    const label = `${slot.p}° Gr.${slot.g}`;
    if (useReal && !S.phase.groupsDone) return label;
    if (!useReal && !hasGroupData(slot.g, results)) return label;
    const rows = calcStandings(slot.g, results);
    return rows[slot.p-1]?.team || label;
  }
  if (slot.t === '3rd') {
    const label = `3°Gr.${slot.g}`;
    if (useReal && !S.phase.groupsDone) return label;
    if (!useReal && !hasGroupData(slot.g, results)) return label;
    const rows = calcStandings(slot.g, results);
    return rows[2]?.team || label;
  }
  const koResults = useReal ? S.real.ko : (S.myPreds.ko || {});
  if (slot.t === 'ko' || slot.t === 'koL') {
    const m = KO_MATCHES.find(x => x.id === slot.m);
    if (!m) return '?';
    const r = koResults[slot.m];
    if (!r || r.h===undefined || r.h==='') return '?';
    const rh = parseInt(r.h), ra = parseInt(r.a);
    if (isNaN(rh)||isNaN(ra)) return '?';
    const ht = resolveSlot(m.hs, useReal, predGroups);
    const at = resolveSlot(m.as, useReal, predGroups);
    if (slot.t === 'koL') {
      if (rh !== ra) return rh > ra ? at : ht;
      const ph = parseInt(r.ph), pa = parseInt(r.pa);
      return (!isNaN(ph)&&!isNaN(pa)) ? (ph>pa?at:ht) : '?';
    }
    if (rh !== ra) return rh > ra ? ht : at;
    const ph = parseInt(r.ph), pa = parseInt(r.pa);
    return (!isNaN(ph)&&!isNaN(pa)) ? (ph>pa?ht:at) : '?';
  }
  return '?';
}

// Devuelve true si el partido ya cerró predicciones (10 min antes del kickoff o después)
// Los horarios en KO_MATCHES están en hora Argentina (ART = UTC-3)
function isMatchLocked(m) {
  if (S.phase.koDone) return true;
  if (!m || !m.date || !m.time) return false;
  const [y,mo,d] = m.date.split('-').map(Number);
  const [h,min] = m.time.split(':').map(Number);
  const kickoffUTC = Date.UTC(y, mo-1, d, h+3, min); // ART→UTC: +3h
  return Date.now() >= kickoffUTC - 10*60*1000;
}

function getSign(h,a){return h>a?'H':a>h?'A':'D';}

// ==================== POINTS ====================
function calcGroupPts(pred, real) {
  if (!pred||!real) return 0;
  const ph=parseInt(pred.h),pa=parseInt(pred.a),rh=parseInt(real.h),ra=parseInt(real.a);
  if([ph,pa,rh,ra].some(isNaN)) return 0;
  if(ph===rh&&pa===ra) return 3;
  if(getSign(ph,pa)===getSign(rh,ra)) return 1;
  return 0;
}
// Devuelve el marcador en tiempo reglamentario (resta penales si los hay)
function realNTScore(real) {
  let rh=parseInt(real.h), ra=parseInt(real.a);
  if (real.ph!==undefined && !isNaN(parseInt(real.ph))) { rh-=parseInt(real.ph); ra-=parseInt(real.pa); }
  return {rh, ra};
}
function calcKOPts(pred, real, round) {
  if (!pred||!real) return 0;
  const ph=parseInt(pred.h), pa=parseInt(pred.a);
  const {rh, ra} = realNTScore(real);
  if([ph,pa,rh,ra].some(isNaN)) return 0;
  // Empate en tiempo reglamentario → puntuación igual que grupos (3pts exacto, 1pt signo)
  if (rh===ra) {
    if(ph===rh&&pa===ra) return 3;
    if(getSign(ph,pa)===0) return 1;
    return 0;
  }
  // Resultado definido en tiempo reglamentario → puntuación según ronda
  if (round==='R32') {
    if(ph===rh&&pa===ra) return 3;
    if(getSign(ph,pa)===getSign(rh,ra)) return 1;
    return 0;
  }
  if(ph===rh&&pa===ra) return 5;
  if(getSign(ph,pa)===getSign(rh,ra)) return 2;
  return 0;
}

function calcAllPts(uid) {
  const preds = uid === S.user?.uid ? S.myPreds : (S.allPreds[uid] || {});
  const pts = {grp:0, grpBonus:0, r32:0, r32Bonus:0, r16:0, r16Bonus:0, qf:0, qfBonus:0, sf:0, sfBonus:0, fin:0, sp:0, total:0};
  
  // Group matches
  Object.keys(GROUPS).forEach(g => {
    GROUPS[g].matches.forEach(m => {
      const pred = (preds.groups||{})[m.id];
      const real = S.real.groups[m.id];
      pts.grp += calcGroupPts(pred, real);
    });
    // Group position bonus (sólo si el usuario predijo al menos un partido del grupo)
    if (S.phase.groupsBonus && hasGroupData(g, preds.groups||{})) {
      const realRows = calcStandings(g, S.real.groups);
      const predRows = calcStandings(g, preds.groups||{});
      if (realRows[0]&&predRows[0]&&realRows[1]&&predRows[1] &&
          realRows[0].team===predRows[0].team && realRows[1].team===predRows[1].team) {
        pts.grpBonus += 3;
        if (realRows[2]&&predRows[2]&&realRows[2].team===predRows[2].team) pts.grpBonus += 1;
      }
    }
  });

  // KO matches
  KO_MATCHES.forEach(m => {
    const pred = (preds.ko||{})[m.id];
    const real = S.real.ko[m.id];
    if (!pred||!real) return;
    let p = calcKOPts(pred, real, m.round);
    const realWin = resolveSlot({t:'ko',m:m.id}, true, null);
    const predWin = resolveSlot({t:'ko',m:m.id}, false, preds.groups||{});
    // Overwrite for pred-based resolution using preds.ko for this match
    // We need a custom resolve here using preds
    const predR = (preds.ko||{})[m.id];
    // Comparar qué LADO ganó (h o a) para evitar errores de nombres entre pred/real
    let predSide = '?';
    if (predR && predR.h!==undefined && predR.h!=='') {
      const prh=parseInt(predR.h),pra=parseInt(predR.a);
      if(!isNaN(prh)&&!isNaN(pra)) {
        if(prh!==pra) predSide = prh>pra?'h':'a';
        else predSide = predR.adv||'?';
      }
    }
    let realSide = '?';
    if (real.h!==undefined&&real.h!=='') {
      const {rh:rrh,ra:rra} = realNTScore(real);
      if(!isNaN(rrh)&&!isNaN(rra)) {
        if(rrh!==rra) realSide = rrh>rra?'h':'a';
        else { const rph=parseInt(real.ph),rpa=parseInt(real.pa); realSide=(!isNaN(rph)&&!isNaN(rpa))?(rph>rpa?'h':'a'):'?'; }
      }
    }
    const advBonus = (m.round!=='FIN'&&m.round!=='3P'&&predSide!=='?'&&realSide!=='?'&&predSide===realSide)?1:0;
    switch(m.round) {
      case 'R32': pts.r32 += p; pts.r32Bonus += advBonus; break;
      case 'R16': pts.r16 += p; pts.r16Bonus += advBonus; break;
      case 'QF': pts.qf += p; pts.qfBonus += advBonus; break;
      case 'SF': pts.sf += p; pts.sfBonus += advBonus; break;
      case 'FIN': pts.fin += p; break;
    }
  });

  // Specials (sólo se calculan/suman si el admin activó el flag spEnabled)
  if (S.phase.spEnabled) {
    const sp = preds.specials || {};
    const rsp = S.realSp || {};
    if (rsp.topScorer && sp.topScorer && rsp.topScorer===sp.topScorer) pts.sp+=5;
    if (rsp.mostGoalsTeam && sp.mostGoalsTeam && rsp.mostGoalsTeam===sp.mostGoalsTeam) pts.sp+=3;
    if (rsp.mostConcededTeam && sp.mostConcededTeam && rsp.mostConcededTeam===sp.mostConcededTeam) pts.sp+=3;
    if (rsp.mostRedCards && sp.mostRedCards && rsp.mostRedCards===sp.mostRedCards) pts.sp+=3;
    if (rsp.injured && sp.injured && rsp.injured===sp.injured) pts.sp+=10;
    if (rsp.champion && sp.champion && rsp.champion===sp.champion) pts.sp+=15;
    if (rsp.runnerUp && sp.runnerUp && rsp.runnerUp===sp.runnerUp) pts.sp+=10;
    if (rsp.third && sp.third && rsp.third===sp.third) pts.sp+=5;
    // Punto Gol
    ['pg1','pg2','pg3'].forEach(k => {
      if (sp[k]) {
        const goals = (S.realSp.goals||{})[sp[k]] || 0;
        pts.sp += goals;
      }
    });
  }

  pts.total = pts.grp + pts.grpBonus + pts.r32 + pts.r32Bonus + pts.r16 + pts.r16Bonus + pts.qf + pts.qfBonus + pts.sf + pts.sfBonus + pts.fin + pts.sp;
  return pts;
}

function resolveSlotForUser(slot, uid) {
  const preds = uid === S.user?.uid ? S.myPreds : (S.allPreds[uid]||{});
  const predGroups = preds.groups || {};
  const predKO = preds.ko || {};
  if (!slot) return '?';
  if (slot.t === 'grp') {
    const rows = calcStandings(slot.g, predGroups);
    return rows[slot.p-1]?.team || `${slot.g}${slot.p}`;
  }
  if (slot.t === '3rd') {
    const rows = calcStandings(slot.g, predGroups);
    return rows[2]?.team || `3°Gr.${slot.g}`;
  }
  if (slot.t === 'ko' || slot.t === 'koL') {
    const m = KO_MATCHES.find(x => x.id === slot.m);
    if (!m) return '?';
    const r = predKO[slot.m];
    if (!r||r.h===undefined||r.h==='') return '?';
    const rh=parseInt(r.h),ra=parseInt(r.a);
    if(isNaN(rh)||isNaN(ra)) return '?';
    const ht = resolveSlotForUser(m.hs, uid);
    const at = resolveSlotForUser(m.as, uid);
    if (slot.t==='koL') {
      if(rh!==ra) return rh>ra?at:ht;
      const ph=parseInt(r.ph),pa=parseInt(r.pa);
      return(!isNaN(ph)&&!isNaN(pa))?(ph>pa?at:ht):'?';
    }
    if(rh!==ra) return rh>ra?ht:at;
    const ph=parseInt(r.ph),pa=parseInt(r.pa);
    return(!isNaN(ph)&&!isNaN(pa))?(ph>pa?ht:at):'?';
  }
  return '?';
}

// ==================== AUTH ====================
async function doLogin(name, pass) {
  if (!name||!pass) return 'Completá nombre y clave.';
  const uid = fnv1a(name.toLowerCase().trim());
  if (name.toLowerCase().trim() === 'admin' && pass === ADMIN_PASS) {
    S.user = {uid:'admin',name:'Admin',isAdmin:true};
    localStorage.setItem('prode_user',JSON.stringify(S.user));
    await loadAllData();
    return null;
  }
  const snap = await DB.ref(`users/${uid}`).get();
  if (!snap.exists()) {
    const salt = genSalt();
    const hash = hashPass(pass, salt);
    await DB.ref(`users/${uid}`).set({name:name.trim(), hash, salt});
    S.user = {uid, name:name.trim(), isAdmin:false};
    localStorage.setItem('prode_user',JSON.stringify(S.user));
    await loadAllData();
    return null;
  }
  const data = snap.val();
  if (hashPass(pass, data.salt) !== data.hash) return 'Clave incorrecta.';
  S.user = {uid, name:data.name, isAdmin:false};
  localStorage.setItem('prode_user',JSON.stringify(S.user));
  await loadAllData();
  return null;
}

// ==================== DATA LOADING ====================
async function loadAllData() {
  const uid = S.user.uid;
  // Load real results
  DB.ref('real').on('value', snap => {
    S.real = snap.val() || {groups:{},ko:{}};
    if (!S.real.groups) S.real.groups = {};
    if (!S.real.ko) S.real.ko = {};
  });
  // Load real specials
  DB.ref('realSp').on('value', snap => { S.realSp = snap.val() || {}; });
  // Load phase
  DB.ref('phase').on('value', snap => { S.phase = snap.val() || {groupsDone:false,groupsBonus:false,koDone:false,spEnabled:false,spDone:false}; });
  // Load my preds
  if (uid !== 'admin') {
    DB.ref(`preds/${uid}`).on('value', snap => {
      const d = snap.val() || {};
      if (!S.myPreds._init) {
        S.myPreds = { groups:d.groups||{}, ko:d.ko||{}, specials:d.specials||{}, _init:true };
      }
    });
  }
  // Load users
  DB.ref('users').on('value', snap => { S.users = snap.val() || {}; });
  // Load all preds (needed by everyone to compute the ranking, not just admin)
  DB.ref('preds').on('value', snap => { S.allPreds = snap.val() || {}; });
  // Auto-refresh KO preds panel cada 60s para que el lock aparezca sin recargar la página
  setInterval(() => {
    if (S.subTab === 'ko') {
      const el = document.getElementById('preds-content');
      if (el) el.innerHTML = renderKOPreds();
    }
  }, 60000);
}

// ==================== FIXTURE TAB ====================
function renderFixture() {
  // Collect all matches with dates
  const allM = [];
  Object.keys(GROUPS).forEach(g => GROUPS[g].matches.forEach(m => allM.push({...m,round:`Grupo ${g}`})));
  KO_MATCHES.forEach(m => allM.push({...m,round:ROUND_LABELS[m.round]||m.round}));
  allM.sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
  
  const byDate = {};
  allM.forEach(m => { if(!byDate[m.date]) byDate[m.date]=[]; byDate[m.date].push(m); });
  
  let html = '';
  Object.keys(byDate).sort().forEach(date => {
    html += `<div class="fixture-day"><div class="fixture-day-header">${fmtDate(date)}, ${date.split('-')[0]}</div>`;
    byDate[date].forEach(m => {
      const isKO = !!m.hs;
      const hName = isKO ? resolveSlot(m.hs, true, null) : m.h;
      const aName = isKO ? resolveSlot(m.as, true, null) : m.a;
      const real = isKO ? S.real.ko[m.id] : S.real.groups[m.id];
      const hasReal = real && real.h!==undefined && real.h!=='';
      html += `<div class="fixture-match">
        <span class="fixture-time">${m.time}</span>
        <span class="fixture-round">${m.round}</span>
        <div class="fixture-team flex1">${flag(hName)}<span>${hName}</span></div>
        <div class="fixture-score ${hasReal?'':'pending'}">${hasReal?`${real.h}-${real.a}`:'vs'}</div>
        <div class="fixture-team right flex1">${flag(aName)}<span>${aName}</span></div>
      </div>`;
    });
    html += `</div>`;
  });
  return html;
}

function renderAdminPreds() {
  const uids = Object.keys(S.users);
  if (!uids.length) return '<div class="empty-state">No hay participantes.</div>';
  if (!S.adminPredsPhase) S.adminPredsPhase = 'grp_A';

  const grpPhases = Object.keys(GROUPS).map(g => ({v:`grp_${g}`, l:`Grupo ${g}`}));
  const koPhases = [
    {v:'R32', l:'Ronda de 32'},
    {v:'R16', l:'Octavos'},
    {v:'QF', l:'Cuartos'},
    {v:'SF', l:'Semis'},
    {v:'3P', l:'3er Puesto'},
    {v:'FIN', l:'Final'},
  ];
  const allPhases = [...grpPhases, ...koPhases];

  const names = uids.map(uid => S.users[uid]?.name || uid);

  let html = `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
    ${allPhases.map(o=>`<button class="subtab ${S.adminPredsPhase===o.v?'active':''}" onclick="S.adminPredsPhase='${o.v}';updateAdminContent()">${o.l}</button>`).join('')}
  </div>`;

  const thStyle = 'padding:5px 8px;font-size:11px;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);text-align:center;white-space:nowrap';
  const tdStyle = 'padding:5px 8px;font-size:12px;text-align:center;border-bottom:1px solid var(--border)';
  const tdLeft = 'padding:5px 8px;font-size:12px;border-bottom:1px solid var(--border);white-space:nowrap';

  if (S.adminPredsPhase.startsWith('grp_')) {
    const g = S.adminPredsPhase.replace('grp_', '');
    const grp = GROUPS[g];
    if (!grp) return html + '<div class="empty-state">Grupo no encontrado.</div>';

    html += `<div class="card" style="overflow-x:auto"><table class="std-table" style="min-width:500px;width:100%">
      <thead><tr>
        <th style="${thStyle};text-align:left">Partido</th>
        <th style="${thStyle}">Real</th>
        ${names.map(n=>`<th style="${thStyle}">${esc(n)}</th>`).join('')}
      </tr></thead><tbody>`;

    grp.matches.forEach(m => {
      const real = S.real.groups[m.id];
      const realStr = real?.h !== undefined ? `${real.h}-${real.a}` : '—';
      html += `<tr>
        <td style="${tdLeft}">${m.h} vs ${m.a}</td>
        <td style="${tdStyle};font-weight:600;color:var(--green)">${realStr}</td>
        ${uids.map(uid => {
          const pred = ((S.allPreds[uid]||{}).groups||{})[m.id];
          if (!pred || pred.h === undefined || pred.h === '') return `<td style="${tdStyle};color:var(--text3)">—</td>`;
          const pStr = `${pred.h}-${pred.a}`;
          const correct = real && String(pred.h)===String(real.h) && String(pred.a)===String(real.a);
          const sign = real && !correct && ((+pred.h>+pred.a&&+real.h>+real.a)||(+pred.h<+pred.a&&+real.h<+real.a)||(+pred.h===+pred.a&&+real.h===+real.a));
          const color = correct ? 'var(--green)' : sign ? 'var(--yellow,#e3b341)' : 'var(--text)';
          return `<td style="${tdStyle};color:${color};font-weight:${correct?'700':'400'}">${pStr}</td>`;
        }).join('')}
      </tr>`;
    });

    html += '</tbody></table></div>';
  } else {
    const round = S.adminPredsPhase;
    const matches = KO_MATCHES.filter(m => m.round === round);
    if (!matches.length) return html + '<div class="empty-state">No hay partidos para esta etapa.</div>';

    html += `<div class="card" style="overflow-x:auto"><table class="std-table" style="min-width:500px;width:100%">
      <thead><tr>
        <th style="${thStyle};text-align:left">Partido</th>
        <th style="${thStyle}">Real</th>
        ${names.map(n=>`<th style="${thStyle}">${esc(n)}</th>`).join('')}
      </tr></thead><tbody>`;

    matches.forEach(m => {
      const real = S.real.ko[m.id];
      const hName = S.phase.groupsDone ? (resolveSlot(m.hs, true, null)||'?') : resolveSlot(m.hs, false, {});
      const aName = S.phase.groupsDone ? (resolveSlot(m.as, true, null)||'?') : resolveSlot(m.as, false, {});
      const realStr = real?.h !== undefined ? `${real.h}-${real.a}${real.ph!==undefined?` (p:${real.ph}-${real.pa})`:''}` : '—';
      html += `<tr>
        <td style="${tdLeft}">${shortTeam(hName)} vs ${shortTeam(aName)}<br><span style="font-size:10px;color:var(--text3)">${fmtDate(m.date)} ${m.time}</span></td>
        <td style="${tdStyle};font-weight:600;color:var(--green)">${realStr}</td>
        ${uids.map(uid => {
          const pred = ((S.allPreds[uid]||{}).ko||{})[m.id];
          if (!pred || pred.h === undefined || pred.h === '') return `<td style="${tdStyle};color:var(--text3)">—</td>`;
          const pStr = `${pred.h}-${pred.a}`;
          const correct = real && String(pred.h)===String(real.h) && String(pred.a)===String(real.a);
          const sign = real && !correct && ((+pred.h>+pred.a&&+real.h>+real.a)||(+pred.h<+pred.a&&+real.h<+real.a)||(+pred.h===+pred.a&&+real.h===+real.a));
          const advStr = pred.adv ? ` →${pred.adv==='h'?shortTeam(hName):shortTeam(aName)}` : '';
          const color = correct ? 'var(--green)' : sign ? 'var(--yellow,#e3b341)' : 'var(--text)';
          return `<td style="${tdStyle};color:${color};font-weight:${correct?'700':'400'}">${pStr}${advStr}</td>`;
        }).join('')}
      </tr>`;
    });

    html += '</tbody></table></div>';
  }

  return html;
}

async function doLoginUI() {
  const name = document.getElementById('ln')?.value?.trim();
  const pass = document.getElementById('lp')?.value;
  const err = await doLogin(name, pass);
  if (err) { document.getElementById('login-err').textContent = err; }
  else { S.tab='preds'; render(); }
}

function logout() {
  S.user = null;
  S.myPreds = {groups:{},ko:{},specials:{}};
  localStorage.removeItem('prode_user');
  render();
}

function setTab(tab) { S.tab=tab; render(); }
function setSubTab(sub) {
  S.subTab=sub;
  document.getElementById('preds-content').innerHTML = renderPredsContent();
}
function setAdminTab(tab) {
  S.adminTab=tab;
  document.getElementById('admin-content').innerHTML = renderAdminContent();
}
function updateAdminContent() {
  const el = document.getElementById('admin-content');
  if (el) el.innerHTML = renderAdminContent();
}

function savePred(type, matchId, side, value, groupId) {
  if (!S.myPreds[type]) S.myPreds[type] = {};
  if (!S.myPreds[type][matchId]) S.myPreds[type][matchId] = {};
  S.myPreds[type][matchId][side] = value;
  const uid = S.user.uid;
  dbWrite(`preds/${uid}/${type}/${matchId}/${side}`, value);

// ==================== FOOTBALL-DATA.ORG SYNC ====================
// API: https://www.football-data.org  — Free tier covers FIFA World Cup (code: WC)
// Auth header: X-Auth-Token
// Endpoints used:
//   GET /v4/competitions/WC/matches?status=FINISHED  → all finished matches
//   GET /v4/competitions/WC/scorers?limit=100        → top scorers

const FDO_BASE = 'https://api.football-data.org/v4';

// football-data.org stage → our round ID
const FDO_STAGE_MAP = {
  'GROUP_STAGE': 'group',
  'LAST_32': 'R32', 'LAST_16': 'R16',
  'QUARTER_FINALS': 'QF', 'SEMI_FINALS': 'SF',
  'THIRD_PLACE': '3P', 'FINAL': 'FIN',
};

async function fdoGet(path, apiKey) {
  const res = await fetch(`${FDO_BASE}${path}`, {
    headers: { 'X-Auth-Token': apiKey }
  });
  if (!res.ok) {
    const msg = await res.text().catch(() => '');
    throw new Error(`HTTP ${res.status}: ${msg.slice(0, 120)}`);
  }
  return res.json();
}

async function bdlSync(apiKey, statusEl) {
  statusEl.textContent = '⏳ Sincronizando partidos desde football-data.org...';
  statusEl.style.color = 'var(--text2)';
  try {
    const json = await fdoGet('/competitions/WC/matches?status=FINISHED', apiKey);
    const matches = json.matches || [];
    let updated = 0, skipped = 0;

    for (const m of matches) {
      const hRaw = m.homeTeam?.name || m.homeTeam?.shortName || '';
      const aRaw = m.awayTeam?.name || m.awayTeam?.shortName || '';
      const hName = mapTeam(hRaw);
      const aName = mapTeam(aRaw);
      if (!hName || !aName) { skipped++; continue; }

      const score   = m.score || {};
      const ft      = score.fullTime || {};
      const pen     = score.penalties || {};
      const hasPen  = score.duration === 'PENALTY_SHOOTOUT';
      const result  = { h: ft.home ?? 0, a: ft.away ?? 0 };
      if (hasPen) { result.ph = pen.home ?? 0; result.pa = pen.away ?? 0; }

      const stage = m.stage || '';
      const isGroup = stage === 'GROUP_STAGE';

      if (isGroup) {
        const found = findGroupMatchId(hName, aName);
        if (!found) { skipped++; continue; }
        const r = found.reversed ? { h: result.a, a: result.h } : result;
        await DB.ref(`real/groups/${found.id}`).set(r);
        if (!S.real.groups) S.real.groups = {};
        S.real.groups[found.id] = r;
        updated++;
      } else {
        const found = findKOMatchId(hName, aName);
        if (!found) { skipped++; continue; }
        const rev = found.reversed;
        const r = rev
          ? { h: result.a, a: result.h, ...(hasPen ? { ph: result.pa, pa: result.ph } : {}) }
          : result;
        await DB.ref(`real/ko/${found.id}`).set(r);
        if (!S.real.ko) S.real.ko = {};
        S.real.ko[found.id] = r;
        updated++;
      }
    }

    statusEl.textContent = `✅ ${updated} partidos actualizados, ${skipped} salteados — ${new Date().toLocaleTimeString()}`;
    statusEl.style.color = 'var(--green)';
  } catch(e) {
    statusEl.textContent = `❌ Error: ${e.message}`;
    statusEl.style.color = 'var(--red)';
  }
}

function runBDLSync() {
  const key = (document.getElementById('bdl-key')?.value || '').trim();
  if (!key) { document.getElementById('bdl-status').textContent = 'Ingresá tu API key primero.'; return; }
  localStorage.setItem('fdoApiKey', key);
  bdlSync(key, document.getElementById('bdl-status'));
}

async function adminResetPassword(uid) {
  const input = document.getElementById(`newpw_${uid}`);
  const newPass = input?.value?.trim();
  if (!newPass) { alert('Escribí una clave nueva.'); return; }
  const salt = genSalt();
  const hash = hashPass(newPass, salt);
  await DB.ref(`users/${uid}`).update({ hash, salt });
  input.value = '';
  const ok = document.getElementById(`pwok_${uid}`);
  if (ok) { ok.textContent = '✓ Guardada'; setTimeout(() => { ok.textContent = ''; }, 2000); }
}

async function adminDeleteUser(uid, name) {
  if (!confirm(`¿Seguro que querés eliminar a ${name}? Se borran también todas sus predicciones.`)) return;
  await DB.ref(`users/${uid}`).remove();
  await DB.ref(`preds/${uid}`).remove();
  delete S.users[uid];
  delete S.allPreds[uid];
  document.getElementById('admin-content').innerHTML = renderAdminContent();
}

  // Try restore session
  const saved = localStorage.getItem('prode_user');
  if (saved) {
    try {
      S.user = JSON.parse(saved);
      await loadAllData();
      // Wait a tick for Firebase listeners to populate
      await new Promise(r => setTimeout(r, 600));
    } catch(e) { S.user = null; localStorage.removeItem('prode_user'); }
  }
  render();
}
